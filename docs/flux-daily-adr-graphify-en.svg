<svg viewBox="0 0 1080 1350" xmlns="http://www.w3.org/2000/svg" font-family="Arial, 'Helvetica Neue', sans-serif">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1080" height="1350" fill="#EBF0E2"/>

  <!-- chip -->
  <rect x="80" y="70" width="250" height="46" rx="23" fill="#E7EDDF"/>
  <circle cx="106" cy="93" r="6" fill="#647E5B"/>
  <text x="124" y="100" font-size="20" font-weight="700" fill="#647E5B" letter-spacing="1.5">THE MECHANISM</text>

  <!-- headline -->
  <text x="78" y="200" font-size="66" font-weight="800" fill="#191512" letter-spacing="-1">THE WHY</text>
  <text x="78" y="272" font-size="66" font-weight="800" fill="#647E5B" letter-spacing="-1">NEVER DIES.</text>

  <!-- subhead mono -->
  <text x="82" y="322" font-size="23" font-weight="700" fill="#9C9089" font-family="'Courier New', monospace">daily  →  wiki/decisions/  →  graphify-out/</text>

  <!-- CARD 1 : daily -->
  <rect x="80" y="362" width="920" height="176" rx="20" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="120" y="412" font-size="22" font-weight="700" fill="#9C9089" font-family="'Courier New', monospace">daily/</text>
  <text x="120" y="462" font-size="34" font-weight="800" fill="#191512">The decision is noted</text>
  <text x="120" y="502" font-size="21" fill="#9C9089">in today's note — "Decisions made" section</text>
  <rect x="820" y="384" width="150" height="36" rx="18" fill="#E4E8DC"/>
  <text x="895" y="408" font-size="17" font-weight="700" fill="#8A7E76" text-anchor="middle" letter-spacing="1">EPHEMERAL</text>

  <!-- arrow 1 -->
  <line x1="540" y1="552" x2="540" y2="598" stroke="#647E5B" stroke-width="3"/>
  <polygon points="530,596 550,596 540,610" fill="#647E5B"/>
  <text x="566" y="585" font-size="20" font-style="italic" fill="#8A7E76">graduates before the purge (30 d)</text>

  <!-- CARD 2 : ADR (hero) -->
  <rect x="80" y="616" width="920" height="206" rx="20" fill="#E9EEE3" stroke="#647E5B" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="120" y="668" font-size="22" font-weight="700" fill="#647E5B" font-family="'Courier New', monospace">wiki/decisions/</text>
  <text x="120" y="722" font-size="37" font-weight="800" fill="#191512">ADR — the why, fixed in place</text>
  <text x="120" y="766" font-size="21" fill="#7A6F68">context · rejected options · consequences</text>
  <rect x="800" y="640" width="168" height="38" rx="19" fill="#647E5B"/>
  <text x="884" y="665" font-size="17" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">PERMANENT</text>

  <!-- arrow 2 -->
  <line x1="540" y1="836" x2="540" y2="882" stroke="#647E5B" stroke-width="3"/>
  <polygon points="530,880 550,880 540,894" fill="#647E5B"/>
  <text x="566" y="869" font-size="20" font-style="italic" fill="#8A7E76">indexed by the graph</text>

  <!-- CARD 3 : Graphify -->
  <rect x="80" y="900" width="920" height="176" rx="20" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="120" y="950" font-size="22" font-weight="700" fill="#9C9089" font-family="'Courier New', monospace">graphify-out/</text>
  <text x="120" y="1000" font-size="34" font-weight="800" fill="#191512">The queryable graph layer</text>
  <text x="120" y="1040" font-size="21" fill="#9C9089">"why did we choose X?"</text>
  <rect x="792" y="922" width="176" height="36" rx="18" fill="#E7EDDF"/>
  <text x="880" y="946" font-size="17" font-weight="700" fill="#647E5B" text-anchor="middle" letter-spacing="1">QUERYABLE</text>

  <!-- footer caption -->
  <text x="80" y="1168" font-size="27" font-weight="600" fill="#191512">Without the ADR, the decision dies with the daily note.</text>
  <text x="80" y="1208" font-size="27" font-weight="800" fill="#647E5B">With it, it stays queryable — forever.</text>
  <text x="80" y="1292" font-size="19" fill="#B3A79F" font-family="'Courier New', monospace">Vault Methodology Template · Datashiru · CC BY-NC 4.0</text>
</svg>
